<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="single.css">
</head>
<body>
  <main class="results">
    <h1 class="title">Your Relationship Readiness Insight</h1>
    <div id="recommendation"></div>
    <button onclick="window.location.href='start.html'">Restart</button>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const answers = JSON.parse(localStorage.getItem('questionnaire') || '{}');
      const pattern = determinePattern(answers);
      const rec = getRecommendation(pattern);
      document.getElementById('recommendation').innerHTML = rec;
    });

    function determinePattern(answers) {
      if (answers.q1 === 'enjoy') return 1;
      if (answers.q4 === 'time') return 2;
      if (answers.q4 === 'past' || answers.q4 === 'ready') return 3;
      if (answers.q4 === 'compatible') return 4;
      if (answers.q5 === 'neutral' || answers.q5 === 'not') return 5;
      if (answers.q7 === 'circumstances' || answers.q7 === 'timing') return 6;
      if (answers.q7 === 'uncertainty') return 7;
      return 5;
    }

    function getRecommendation(pattern) {
      const recommendations = {
        1: `
          <h2>🌱 Pattern 1: Independence & Self-Focus</h2>
          <p><strong>Interpretation:</strong> This person is single by choice, valuing freedom and self-development.</p>

            <li>Keep nurturing your independence — it's a strength.</li>
            <li>If you ever want to date, try low-pressure environments (shared hobbies, casual meetups).</li>
            <li>Balance self-focus with openness to connection.</li>

          <p>If you're female, contact us on WhatsApp: +234 9030729683</p>

          <h2>🕊️ Pattern 5: Neutral or Content with Singleness</h2>
