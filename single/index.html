<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="single.css">
</head>
<body>
  <div class="welcome-card">
    <h1 class="welcome-title">Welcome!</h1>
    <p class="welcome-message">Hello, <span id="username">Guest</span>! We're excited to help you find why you are single.</p>
    <button onclick="window.location.href='start.html'">start</button>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const username = localStorage.getItem('username') || 'Guest';
      document.getElementById('username').textContent = username;
    });
  </script>
</body>
</html>
